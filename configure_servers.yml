---
- name: Configure servers with Zabbix Agent2
  hosts: all
  become: yes

  vars:
    zabbix_server: "{{ zabbix_server_ip }}"

  tasks:

    - name: Install dependencies
      apt:
        name:
          - wget
          - gnupg
        state: present
        update_cache: yes

    - name: Add Zabbix repository
      apt:
        deb: https://repo.zabbix.com/zabbix/7.0/ubuntu/pool/main/z/zabbix-release/zabbix-release_latest_7.0+ubuntu24.04_all.deb

    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Install Zabbix agent2
      apt:
        name: zabbix-agent2
        state: present

    - name: Configure Zabbix agent2
      template:
        src: zabbix_agent2.conf.j2
        dest: /etc/zabbix/zabbix_agent2.conf
        owner: root
        group: root
        mode: '0644'

    - name: Enable and start Zabbix agent2
      systemd:
        name: zabbix-agent2
        enabled: yes
        state: restarted